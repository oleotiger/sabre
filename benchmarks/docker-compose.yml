    labels:
      sabre.benchmark: "image_processing"

  # ── 9. model_training ─────────────────────────────────────────────────────
  # ML 模型训练（sklearn 逻辑回归 / 随机森林）
  # gRPC 默认端口: 50059
  model_training:
    <<: *common
    container_name: model_training
    image: model_training:latest
    cpuset: "0"
    mem_limit: 1024m
    environment:
      - GRPC_PORT=50059
    ports:
      - "50059:50059"
    labels:
      sabre.benchmark: "model_training"

  # ── 10. dna_visualization ─────────────────────────────────────────────────
  # DNA 序列可视化（碱基对统计与绘图）
  # gRPC 默认端口: 50060
