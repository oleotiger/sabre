    labels:
      sabre.benchmark: "video_processing"

  # ── 13. rnn_generate_character_level ──────────────────────────────────────
  # RNN 字符级文本生成（PyTorch）
  # gRPC 默认端口: 50063
  rnn_generate_character_level:
    <<: *common
    container_name: rnn_generate_character_level
    image: rnn_generate_character_level:latest
    cpuset: "0"
    mem_limit: 1024m
    environment:
      - GRPC_PORT=50063
    ports:
      - "50063:50063"
    labels:
      sabre.benchmark: "rnn_generate_character_level"

  # ── 14. python_list ───────────────────────────────────────────────────────
